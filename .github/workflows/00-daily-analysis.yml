          ANSPIRE_LLM_BASE_URL: ${{ vars.ANSPIRE_LLM_BASE_URL || secrets.ANSPIRE_LLM_BASE_URL }}
          ANSPIRE_LLM_ENABLED: ${{ vars.ANSPIRE_LLM_ENABLED || secrets.ANSPIRE_LLM_ENABLED }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          MINIMAX_API_KEYS: ${{ secrets.MINIMAX_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          SEARXNG_BASE_URLS: ${{ vars.SEARXNG_BASE_URLS || secrets.SEARXNG_BASE_URLS }}
          SEARXNG_PUBLIC_INSTANCES_ENABLED: ${{ vars.SEARXNG_PUBLIC_INSTANCES_ENABLED || secrets.SEARXNG_PUBLIC_INSTANCES_ENABLED }}
          
          # ==========================================
          # Notification channels (multiple channels may be configured; all receive notifications).
          # ==========================================
          
          # Option 1: WeCom webhook.
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}
          
          # Option 2: Feishu webhook.
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: ${{ vars.FEISHU_WEBHOOK_KEYWORD || secrets.FEISHU_WEBHOOK_KEYWORD }}
          # DingTalk webhook.
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          # Option 3: Telegram.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          
          # Option 4: Email.
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'Daily Stock Analysis Assistant' }}
          
          # Option 5: Pushover.
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}

          # Option 5 extension: ntfy.
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}

          # Option 5 extension: Gotify.
          GOTIFY_URL: ${{ secrets.GOTIFY_URL }}
          GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
          
          # Option 6: PushPlus.
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ vars.PUSHPLUS_TOPIC || secrets.PUSHPLUS_TOPIC }}
          
          # Option 7: Custom webhook (DingTalk, Bark, self-hosted services, etc.).
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          CUSTOM_WEBHOOK_BODY_TEMPLATE: ${{ vars.CUSTOM_WEBHOOK_BODY_TEMPLATE || secrets.CUSTOM_WEBHOOK_BODY_TEMPLATE }}
          WEBHOOK_VERIFY_SSL: ${{ vars.WEBHOOK_VERIFY_SSL || secrets.WEBHOOK_VERIFY_SSL || 'true' }}
          
          # Option 8: Discord.
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
          
          # Option 9: Feishu cloud documents.
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}
          FEISHU_CHAT_ID: ${{ vars.FEISHU_CHAT_ID || secrets.FEISHU_CHAT_ID }}
          FEISHU_RECEIVE_ID_TYPE: ${{ vars.FEISHU_RECEIVE_ID_TYPE || secrets.FEISHU_RECEIVE_ID_TYPE }}
          FEISHU_DOMAIN: ${{ vars.FEISHU_DOMAIN || secrets.FEISHU_DOMAIN }}
          FEISHU_SEND_AS_FILE: ${{ vars.FEISHU_SEND_AS_FILE || secrets.FEISHU_SEND_AS_FILE }}

          # Option 10: AstrBot.
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}

          # Option 11: ServerChan 3.
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}

          # Option 12: Slack.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

          # Notification routing policy (empty keeps all configured channels).
          NOTIFICATION_REPORT_CHANNELS: ${{ vars.NOTIFICATION_REPORT_CHANNELS || secrets.NOTIFICATION_REPORT_CHANNELS }}
          NOTIFICATION_ALERT_CHANNELS: ${{ vars.NOTIFICATION_ALERT_CHANNELS || secrets.NOTIFICATION_ALERT_CHANNELS }}
          NOTIFICATION_SYSTEM_ERROR_CHANNELS: ${{ vars.NOTIFICATION_SYSTEM_ERROR_CHANNELS || secrets.NOTIFICATION_SYSTEM_ERROR_CHANNELS }}
          NOTIFICATION_DEDUP_TTL_SECONDS: ${{ vars.NOTIFICATION_DEDUP_TTL_SECONDS || secrets.NOTIFICATION_DEDUP_TTL_SECONDS || '0' }}
          NOTIFICATION_COOLDOWN_SECONDS: ${{ vars.NOTIFICATION_COOLDOWN_SECONDS || secrets.NOTIFICATION_COOLDOWN_SECONDS || '0' }}
          NOTIFICATION_QUIET_HOURS: ${{ vars.NOTIFICATION_QUIET_HOURS || secrets.NOTIFICATION_QUIET_HOURS }}
          NOTIFICATION_TIMEZONE: ${{ vars.NOTIFICATION_TIMEZONE || secrets.NOTIFICATION_TIMEZONE }}
          NOTIFICATION_MIN_SEVERITY: ${{ vars.NOTIFICATION_MIN_SEVERITY || secrets.NOTIFICATION_MIN_SEVERITY }}
          NOTIFICATION_DAILY_DIGEST_ENABLED: ${{ vars.NOTIFICATION_DAILY_DIGEST_ENABLED || secrets.NOTIFICATION_DAILY_DIGEST_ENABLED || 'false' }}

          # ==========================================
          # Watchlist configuration.
          # ==========================================
          # Avoid writing STOCK_LIST directly and preserve same-name runner environment values.
          STOCK_LIST_CONFIG: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          TRACKING_STOCK_SYMBOLS: ${{ inputs.stock_symbols }}
          ENABLED_MARKETS: ${{ vars.ENABLED_MARKETS || secrets.ENABLED_MARKETS || 'vn' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'cn' }}
          MARKET_REVIEW_COLOR_SCHEME: ${{ vars.MARKET_REVIEW_COLOR_SCHEME || secrets.MARKET_REVIEW_COLOR_SCHEME || 'green_up' }}
          
          # ==========================================
          # Run configuration.
          # ==========================================
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || 'vi' }}
          REPORT_SHOW_LLM_MODEL: ${{ vars.REPORT_SHOW_LLM_MODEL || secrets.REPORT_SHOW_LLM_MODEL || 'true' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'false' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          
          # ==========================================
          # System configuration.
          # ==========================================
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          # Chip distribution: false by default (cloud endpoint is unstable); enable with ENABLE_CHIP_DISTRIBUTION=true in Settings -> Variables.
          ENABLE_CHIP_DISTRIBUTION: ${{ vars.ENABLE_CHIP_DISTRIBUTION || secrets.ENABLE_CHIP_DISTRIBUTION || 'false' }}
          # Realtime quote provider priority (Tencent provides volume ratio and is stable; recommended first).
          # Allowed values: tencent, akshare_sina, efinance, akshare_em, tickflow, tushare.
          # If TickFlow or Tushare Pro is available, move tickflow/tushare earlier based on permissions.
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}
          
        run: |
          # A tracking-app request takes precedence only for this dispatched run.
          # It is validated before becoming STOCK_LIST so manual dispatch input cannot alter the shell command.
          if [ -n "${TRACKING_STOCK_SYMBOLS:-}" ]; then
            if ! [[ "$TRACKING_STOCK_SYMBOLS" =~ ^([A-Z0-9]{1,10}[.]VN)(,[A-Z0-9]{1,10}[.]VN)*$ ]]; then
              echo "Tracking symbols must be comma-separated, uppercase .VN tickers."
              exit 1
            fi
            export STOCK_LIST="$TRACKING_STOCK_SYMBOLS"
          elif [ -n "${STOCK_LIST_CONFIG:-}" ]; then
            export STOCK_LIST="$STOCK_LIST_CONFIG"
          elif [ -z "${STOCK_LIST:-}" ]; then
            export STOCK_LIST="VNM.VN"
          fi

          # Process the LiteLLM YAML configuration file.
          if [ -n "$LITELLM_CONFIG_YAML" ] && [ -n "$LITELLM_CONFIG" ]; then
            echo "📝 Using LITELLM_CONFIG_YAML from GitHub Actions Secrets/Variables"
            # Ensure the directory exists.
            mkdir -p "$(dirname "$LITELLM_CONFIG")"
            # Write the configuration file (overwriting any existing file).
            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG"
            echo "✅ LiteLLM configuration written to: $LITELLM_CONFIG"
          fi

          # Determine the run mode.
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ -n "${TRACKING_STOCK_SYMBOLS:-}" ]; then
            MODE="stocks-only"
          fi
          
          echo "=========================================="
          echo "🚀 Daily Stock Analysis"
          echo "=========================================="
          echo "⏰ HOSE time: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "🎯 Run mode: $MODE"
          echo "📊 Watchlist: $STOCK_LIST"
          echo "📝 Report type: $REPORT_TYPE"
          echo ""
          echo "=========================================="
          echo "📋 Configuration check"
          echo "=========================================="
          echo "[AI configuration]"
          if [ -n "$LITELLM_CONFIG" ] || [ -n "$LITELLM_API_KEY" ] || [ -n "$LITELLM_MODEL" ] || [ -n "$ANSPIRE_API_KEYS" ]; then
            echo "  LiteLLM: ✅ configured"
          else
            echo "  LiteLLM: ❌ not configured"
          fi
          echo "  Gemini API Key: $([ -n "$GEMINI_API_KEY" ] && echo '✅ configured' || echo '❌ not configured')"
          echo "  DeepSeek Key:   $([ -n "$DEEPSEEK_API_KEY" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  Anspire Key:    $([ -n "$ANSPIRE_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  AIHubMix Key:   $([ -n "$AIHUBMIX_KEY" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  OpenAI API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  Anthropic Key:  $([ -n "$ANTHROPIC_API_KEY" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo ""
          echo "[Data sources]"
          echo "  Tushare Token: $([ -n "$TUSHARE_TOKEN" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  TickFlow:      $([ -n "$TICKFLOW_API_KEY" ] && echo '✅ configured' || echo '⚪ not configured')"
          if [ -n "$LONGBRIDGE_APP_KEY" ] && [ -n "$LONGBRIDGE_APP_SECRET" ] && [ -n "$LONGBRIDGE_ACCESS_TOKEN" ]; then
            echo "  Longbridge: ✅ configured (legacy API key)"
          elif [ -n "$LONGBRIDGE_OAUTH_CLIENT_ID" ] || { [ -n "$LONGBRIDGE_APP_KEY" ] && [ -z "$LONGBRIDGE_ACCESS_TOKEN" ]; }; then
            echo "  Longbridge: $([ -n "$LONGBRIDGE_OAUTH_TOKEN_CACHE_B64" ] && echo '✅ configured (OAuth token cache)' || echo '🟡 OAuth client configured, token cache missing')"
          else
            echo "  Longbridge: ⚪ not configured (YFinance only; no Longbridge calls)"
          fi
          echo ""
          echo "[Search engines]"
          echo "  Bocha API Keys: $([ -n "$BOCHA_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  Tavily API Keys: $([ -n "$TAVILY_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  SerpAPI Keys: $([ -n "$SERPAPI_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  MiniMax API Keys: $([ -n "$MINIMAX_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  Brave API Keys: $([ -n "$BRAVE_API_KEYS" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  SearXNG Base URLs: $([ -n "$SEARXNG_BASE_URLS" ] && echo '✅ configured' || echo '⚪ not configured')"
          case "${SEARXNG_PUBLIC_INSTANCES_ENABLED,,}" in
            0|false|no|off)
              echo "  SearXNG Public Instances: ❌ disabled"
              ;;
            "")
              echo "  SearXNG Public Instances: ✅ enabled by default"
              ;;
            *)
              echo "  SearXNG Public Instances: ✅ enabled"
              ;;
          esac
          echo ""
          echo "[Notification channels]"
          echo "  PushPlus: $([ -n "$PUSHPLUS_TOKEN" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  ntfy: $([ -n "$NTFY_URL" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  Gotify: $([ -n "$GOTIFY_URL" ] && [ -n "$GOTIFY_TOKEN" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  WeCom: $([ -n "$WECHAT_WEBHOOK_URL" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  DingTalk: $( [ -n "$DINGTALK_WEBHOOK_URL" ] && echo '✅ configured' || echo '⚪ not configured' )"
          echo "  Feishu: $( ([ -n "$FEISHU_WEBHOOK_URL" ] || ([ -n "$FEISHU_APP_ID" ] && [ -n "$FEISHU_APP_SECRET" ] && [ -n "$FEISHU_CHAT_ID" ]) ) && echo '✅ configured' || echo '⚪ not configured')"
          echo "  Telegram: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  Discord: $([ -n "$DISCORD_WEBHOOK_URL" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  AstrBot: $([ -n "$ASTRBOT_URL" ] && echo '✅ configured' || echo '⚪ not configured')"
          echo "  Slack: $(([ -n "$SLACK_WEBHOOK_URL" ] || ([ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ])) && echo '✅ configured' || echo '⚪ not configured')"
          echo "=========================================="
          echo ""
          
          # Build command-line arguments.
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ Force-run mode enabled (skipping the trading-day check)"
          fi

          # Run the analysis.
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

      - name: Signal Personal Stock Tracking
        if: always() && inputs.tracking_run_id != ''
        env:
          ANALYSIS_CALLBACK_RUN_ID: ${{ inputs.tracking_run_id }}
          ANALYSIS_CALLBACK_URL: ${{ vars.PERSONAL_TRACKING_CALLBACK_URL }}
          ANALYSIS_CALLBACK_SECRET: ${{ secrets.ANALYSIS_CALLBACK_SECRET }}
          ANALYSIS_CALLBACK_STATUS: ${{ steps.analysis.outcome == 'success' && 'succeeded' || 'failed' }}
          ANALYSIS_CALLBACK_SYMBOL: ${{ inputs.stock_symbols }}
          ANALYSIS_CALLBACK_STARTED_AT: ${{ steps.tracking_context.outputs.started_at }}
          DATABASE_PATH: ${{ env.DATABASE_PATH }}
        run: python .github/scripts/callback_analysis_run.py
      
      - name: Upload analysis reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
      
      - name: Show run result
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 Analysis complete"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "Generated reports:"
            ls -la reports/
          else
            echo "⚠️ No report files were generated"
          fi
          echo ""
          if [ -f "logs/stock_analysis_$(date +%Y%m%d).log" ]; then
            echo "📜 Recent logs (last 30 lines):"
            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "No logs"
          fi
