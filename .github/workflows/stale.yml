# Automatically close stale issues and pull requests.
# Check daily and mark issues/PRs without activity for an extended period.

name: Stale Issues & PRs

on:
  schedule:
    # Check daily at 00:00 UTC (08:00 Beijing time).
    - cron: '0 0 * * *'
  # Allow manual runs.
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: 🧹 Clean up stale Issues/PRs
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏷️ Mark and close stale content
        uses: actions/stale@v10
        with:
          # ===== Issue configuration =====
          days-before-issue-stale: 7
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            👋 This issue has had no activity for **7 days**.
            
            If the problem still exists, reply with an update and we will follow up.
            If it is resolved or no longer needed, you can close this issue.
            
            **This issue will be closed automatically if there is no reply within 7 days.**
          close-issue-message: |
            🔒 This issue was automatically closed because it had no activity for an extended period.
            
            If the problem still exists, reopen this issue or create a new one.
          
          # ===== Pull request configuration =====
          days-before-pr-stale: 21
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            👋 This pull request has had no activity for **21 days**.
            
            Please check whether you need to:
            - resolve merge conflicts
            - reply to review feedback
            - update the code
            
            **This pull request will be closed automatically if it is not updated within 14 days.**
          close-pr-message: |
            🔒 This pull request was automatically closed because it had no activity for an extended period.
            
            If you still want to merge these changes, reopen this pull request or create a new one.
          
          # ===== Exclusion rules =====
          # Items with these labels are not marked stale.
          exempt-issue-labels: 'pinned,security,enhancement,help wanted,good first issue'
          exempt-pr-labels: 'pinned,security,work-in-progress,wip'
          
          # Exclude draft pull requests.
          exempt-draft-pr: true
          
          # ===== Other configuration =====
          # Maximum operations per run.
          operations-per-run: 50
          
          # Process only items with these labels.
          only-labels: ''
          
          # Remove the stale label when new activity occurs.
          remove-stale-when-updated: true
          
          # Debug mode (true prints actions without applying them).
          debug-only: false
